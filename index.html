<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTUS ANALYTICS</title>
    <!-- FAVICON: Logo para la pestaña del navegador y resultados de búsqueda -->
    <link rel="icon" type="image/png" href="https://yt3.googleusercontent.com/JgHtt1rjwC2rIDd667ySQiK6xw9tcmUjZ_QNQb0f3t1el2Xfgl-hBG2dk0POKzEfLn7sfLJxg94=s900-c-k-c0x00ffffff-no-rj">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px; }
        
        /* Estilo del Header Original solicitado */
        .logo-bg { background: white; padding: 8px 16px; border-radius: 4px 0 0 4px; }
        .analytics-tag { background: #1a1a1a; padding: 8px 16px; border-radius: 0 4px 4px 0; border: 1px solid #333; border-left: none; }
        
        .table-scroll { overflow-x: auto; font-size: 11px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .btn-link { background: #1a1a1a; border: 1px solid #333; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-link:hover { border-color: #ff00ff; color: #ff00ff; }
        .news-content { white-space: pre-wrap; word-wrap: break-word; }
        select option { background: #0d0d0d; color: white; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div class="flex items-center">
            <div class="logo-bg">
                <img src="https://s3.us-east-2.amazonaws.com/bucket-vform-production/production/Institucion-41/Archivos/Logos/logo-1/Lotus_logo-1.png?1570651579" alt="Lotus" class="h-7">
            </div>
            <div class="analytics-tag">
                <h1 class="text-sm font-black tracking-[0.4em] text-zinc-400">ANALYTICS</h1>
            </div>
        </div>
        
        <label class="cursor-pointer group">
            <input type="file" id="fileInput" class="hidden" onchange="handleFile(event)">
            <div class="border border-zinc-800 px-6 py-2 rounded-full group-hover:border-fuchsia-500 transition-all flex items-center gap-3">
                <span id="fileName" class="text-[10px] text-zinc-400 font-mono uppercase tracking-widest">Cargar Reporte</span>
                <div class="w-2 h-2 rounded-full bg-fuchsia-600 animate-pulse"></div>
            </div>
        </label>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="card p-5 border-l-4 border-fuchsia-600">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-fuchsia-500 mb-3">Noticias</h3>
                <div id="newsTextB3" class="news-content text-sm font-light text-zinc-300 leading-relaxed italic">Esperando archivo...</div>
            </div>
            <div class="card p-5 border-l-4 border-zinc-600">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-zinc-400 mb-3">Lanzamientos Musicales</h3>
                <div id="newsTextC3" class="news-content text-sm font-light text-zinc-300 leading-relaxed">Esperando archivo...</div>
            </div>
            <div class="card p-5">
                <p class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest mb-6">Anuncios últimos 14 días</p>
                <div id="recentList" class="space-y-4 max-h-[1000px] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <select id="filterAnio" onchange="applyFilters()" class="bg-zinc-900 border border-zinc-800 text-white text-[10px] p-3 rounded outline-none focus:border-fuchsia-500">
                    <option value="All">Años: Todos</option>
                    <option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option>
                </select>
                <select id="filterMes" onchange="applyFilters()" class="bg-zinc-900 border border-zinc-800 text-white text-[10px] p-3 rounded outline-none focus:border-fuchsia-500">
                    <option value="All">Mes: Todos</option>
                    <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option><option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option><option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option><option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
                </select>
                <select id="filterProductora" onchange="applyFilters()" class="bg-zinc-900 border border-zinc-800 text-white text-[10px] p-3 rounded outline-none focus:border-fuchsia-500">
                    <option value="All">Todas las Productoras</option>
                </select>
                <select id="filterRecinto" onchange="applyFilters()" class="bg-zinc-900 border border-zinc-800 text-white text-[10px] p-3 rounded outline-none focus:border-fuchsia-500">
                    <option value="All">Todos los Recintos</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="card p-6 border-b-2 border-zinc-800 text-center">
                    <p class="text-[10px] text-zinc-500 uppercase font-black">Eventos Filtrados</p>
                    <h2 id="kpiTotal" class="text-5xl font-black mt-2 tracking-tighter">0</h2>
                </div>
                <div class="card p-6 border-b-2 border-fuchsia-900 text-center">
                    <p id="kpiSoldOutLabel" class="text-[10px] text-zinc-500 uppercase font-black">Sold Outs</p>
                    <h2 id="kpiSoldOut" class="text-5xl font-black mt-2 tracking-tighter text-fuchsia-400">0</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-8">
                <div class="card p-8">
                    <h3 class="text-[10px] font-black uppercase mb-8 text-zinc-500 tracking-[0.3em] text-center">Anuncios por Recinto</h3>
                    <div class="h-[500px] w-full"><canvas id="chartStacked"></canvas></div>
                </div>
                <div class="card p-8">
                    <h3 id="chartLineTitle" class="text-[10px] font-black uppercase mb-8 text-zinc-500 tracking-[0.3em] text-center">Volumen Mensual de Anuncios</h3>
                    <div class="h-[300px] w-full"><canvas id="chartLine"></canvas></div>
                </div>
            </div>

            <div class="card p-4">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="text-[10px] font-black uppercase text-zinc-600">Base de Datos Maestra</h3>
                    <input type="text" id="search" onkeyup="applyFilters()" placeholder="Buscar artista..." class="bg-zinc-900 border border-zinc-800 rounded-md px-3 py-1 text-[10px] text-white outline-none focus:border-fuchsia-500">
                </div>
                <div class="table-scroll max-h-[500px]">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-zinc-600 border-b border-zinc-800 uppercase text-[9px] font-black">
                                <th class="p-4">Artista</th><th class="p-4">Anuncio</th><th class="p-4">Show</th><th class="p-4">Recinto</th><th class="p-4">Productora</th><th class="p-4">Ventas (PV/VG)</th><th class="p-4">Status</th><th class="p-4">Promoción</th><th class="p-4">Link</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let chart1, chart2;

        function fDate(val) {
            if (!val || isNaN(val)) return val || '-';
            let d = new Date(Math.round((val - 25569) * 86400 * 1000));
            d.setMinutes(d.getMinutes() + d.getTimezoneOffset());
            return d.toLocaleDateString('es-CL');
        }

        function fTime(val) {
            if (!val || isNaN(val) || val > 1) return val || '-';
            let totalSeconds = Math.round(val * 86400);
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
        }

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileName').innerText = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                rawData = [];
                json.forEach(row => {
                    const productoras = String(row['Productora'] || 'TBA').split('+').map(s => s.trim());
                    productoras.forEach(p => {
                        rawData.push({ ...row, _productoraUnica: p });
                    });
                });

                try {
                    const wsNews = wb.Sheets["Noticias"] || wb.Sheets[wb.SheetNames[1]];
                    document.getElementById('newsTextB3').innerText = wsNews['B3']?.v || "Sin noticias";
                    document.getElementById('newsTextC3').innerText = wsNews['C3']?.v || "Sin lanzamientos";
                } catch(err) {}
                
                initFilters();
                applyFilters();
            };
            reader.readAsArrayBuffer(file);
        }

        function initFilters() {
            const pSel = document.getElementById('filterProductora');
            const rSel = document.getElementById('filterRecinto');
            const prods = [...new Set(rawData.map(r => r._productoraUnica))].sort();
            const recs = [...new Set(rawData.map(r => r['Recinto']).filter(Boolean))].sort();
            pSel.innerHTML = '<option value="All">Todas las Productoras</option>';
            rSel.innerHTML = '<option value="All">Todos los Recintos</option>';
            prods.forEach(p => pSel.innerHTML += `<option value="${p}">${p}</option>`);
            recs.forEach(r => rSel.innerHTML += `<option value="${r}">${r}</option>`);
        }

        function applyFilters() {
            const pF = document.getElementById('filterProductora').value;
            const rF = document.getElementById('filterRecinto').value;
            const mF = document.getElementById('filterMes').value;
            const aF = document.getElementById('filterAnio').value;
            const sF = document.getElementById('search').value.toLowerCase();

            const filtered = rawData.filter(r => {
                let d = r['Fecha Anuncio'] ? new Date(Math.round((r['Fecha Anuncio'] - 25569) * 86400 * 1000)) : null;
                if(d) d.setMinutes(d.getMinutes() + d.getTimezoneOffset());
                
                const matchP = pF === 'All' || r._productoraUnica === pF;
                const matchR = rF === 'All' || r['Recinto'] === rF;
                const matchM = mF === 'All' || (d && d.getMonth().toString() === mF);
                const matchA = aF === 'All' || (d && d.getFullYear().toString() === aF);
                const matchS = (r['Evento/Artista'] || "").toLowerCase().includes(sF);
                
                return matchP && matchR && matchM && matchA && matchS;
            });

            updateUI(filtered, pF, aF);
        }

        function updateUI(data, selectedProd, selectedAnio) {
            document.getElementById('kpiTotal').innerText = data.length;
            const soldOuts = data.filter(r => (r['Status Venta'] || "").toLowerCase().includes('sold out')).length;
            document.getElementById('kpiSoldOut').innerText = soldOuts;
            document.getElementById('kpiSoldOutLabel').innerText = selectedProd === 'All' ? "Total Sold Outs" : `Sold Outs ${selectedProd}`;

            // ANUNCIOS RECIENTES
            const seen = new Set();
            const uniqueForList = data.filter(r => {
                const id = (r['Evento/Artista'] || "") + (r['Fecha Show'] || "");
                if(seen.has(id)) return false; seen.add(id);
                const limit = new Date().setDate(new Date().getDate() - 14);
                let d = new Date(Math.round((r['Fecha Anuncio'] - 25569) * 86400 * 1000));
                return d >= limit;
            }).sort((a,b) => b['Fecha Anuncio'] - a['Fecha Anuncio']);

            document.getElementById('recentList').innerHTML = uniqueForList.map(r => `
                <div class="border-l-2 border-fuchsia-600 pl-4 py-4 bg-zinc-900/40 rounded-r-lg space-y-3">
                    <p class="text-[9px] font-black text-fuchsia-500 uppercase">ANUNCIO: ${fDate(r['Fecha Anuncio'])} | ${r['Productora']}</p>
                    <p class="text-sm font-black text-white leading-tight">${r['Evento/Artista']}</p>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">${r['Recinto'] || 'Por Definir'}</p>
                    <div class="grid grid-cols-2 gap-2 text-[8px] text-zinc-500 font-bold border-t border-zinc-800 pt-2 uppercase">
                        <div>PV: ${fDate(r['Fecha Preventa'])}</div><div>VG: ${fDate(r['Fecha Venta General'])}</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[8px] font-black uppercase px-2 py-1.5 rounded bg-zinc-800 text-fuchsia-400 flex-grow text-center">${r['Status Venta'] || 'DISPONIBLE'}</span>
                        ${r['Landing Page'] ? `<a href="${r['Landing Page']}" target="_blank" class="text-[8px] font-black uppercase px-3 py-1.5 rounded btn-link">Tickets</a>` : ''}
                    </div>
                </div>
            `).join('');

            // TABLA MAESTRA
            document.getElementById('tableBody').innerHTML = data.map(r => {
                const dcto = r['Dcto'] ? r['Dcto'] + '% DCTO' : '-';
                const promo = `${dcto} | ${r['Auspiciador'] ? String(r['Auspiciador']).toUpperCase() : '-'}`;
                return `<tr class="border-b border-zinc-900/50 hover:bg-zinc-900/50">
                    <td class="p-4 font-bold text-white text-xs">${r['Evento/Artista'] || '-'}</td>
                    <td class="p-4 text-zinc-500 text-[10px]">${fDate(r['Fecha Anuncio'])}</td>
                    <td class="p-4 text-fuchsia-400 font-bold">${fDate(r['Fecha Show'])}</td>
                    <td class="p-4 text-zinc-400">${r['Recinto'] || '-'}</td>
                    <td class="p-4 text-zinc-200">${r['Productora'] || '-'}</td>
                    <td class="p-4 text-[10px] text-zinc-500 uppercase">PV: ${fDate(r['Fecha Preventa'])}<br>VG: ${fDate(r['Fecha Venta General'])}</td>
                    <td class="p-4 italic text-[10px] text-zinc-400 font-bold">${r['Status Venta'] || 'DISPONIBLE'}</td>
                    <td class="p-4 text-zinc-400 text-[10px] font-medium">${promo}</td>
                    <td class="p-4 text-center"><a href="${r['Landing Page'] || '#'}" target="_blank" class="text-fuchsia-500 text-lg">↗</a></td>
                </tr>`;
            }).join('');

            // GRÁFICO 1: RECINTOS / PRODUCTORAS
            const recLabels = [...new Set(data.map(r => r['Recinto']).filter(Boolean))];
            const prods = [...new Set(data.map(r => r._productoraUnica))];
            const colorPalette = ['#ff00ff', '#ffffff', '#444444', '#888888', '#f0abfc', '#701a75', '#a1a1aa'];
            
            const datasets = prods.map((p, i) => ({
                label: p,
                data: recLabels.map(rec => data.filter(r => r['Recinto'] === rec && r._productoraUnica === p).length),
                backgroundColor: colorPalette[i % colorPalette.length],
                borderRadius: 2
            }));

            if(chart1) chart1.destroy();
            chart1 = new Chart(document.getElementById('chartStacked'), {
                type: 'bar', data: { labels: recLabels, datasets },
                options: { 
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: false },
                        tooltip: { enabled: true }
                    },
                    scales: { 
                        x: { stacked: true, grid: { color: '#111' }, ticks: { color: '#444' } }, 
                        y: { 
                            stacked: true, 
                            grid: { display: false }, 
                            ticks: { color: '#bbb', font: {size: 11, weight: 'bold'}, autoSkip: false } 
                        } 
                    }
                }
            });

            // GRÁFICO 2: VOLUMEN MENSUAL
            const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
            const mesData = new Array(12).fill(0);
            const seenMonth = new Set();
            data.forEach(r => {
                const id = (r['Evento/Artista'] || "") + (r['Fecha Show'] || "");
                if(!seenMonth.has(id)) {
                    seenMonth.add(id);
                    let d = new Date(Math.round((r['Fecha Anuncio'] - 25569) * 86400 * 1000));
                    d.setMinutes(d.getMinutes() + d.getTimezoneOffset());
                    mesData[d.getMonth()]++;
                }
            });

            document.getElementById('chartLineTitle').innerText = selectedAnio === 'All' ? "Volumen Mensual (Todos los años)" : `Volumen Mensual Anuncios ${selectedAnio}`;
            if(chart2) chart2.destroy();
            chart2 = new Chart(document.getElementById('chartLine'), {
                type: 'line', data: { labels: meses, datasets: [{ data: mesData, borderColor: '#ff00ff', tension: 0.4, fill: true, backgroundColor: 'rgba(255, 0, 255, 0.05)', borderWidth: 3 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: '#111' }, ticks: { color: '#444' } }, x: { grid: { display: false }, ticks: { color: '#888' } } }
                }
            });
        }
    </script>
</body>
</html>
